name: Deploy SvelteKit (Self-hosted)

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: self-hosted

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install and Build
        run: |
          # 1. プロジェクトディレクトリへ移動
          cd /opt/atserver186.jp
          
          # 2. ソースを最新にする
          git pull origin main
          
          # 3. 依存関係のインストールとビルド
          npm install
          npm run build
          
          # 4. PM2で再起動（反映）
          # ※もし pm2 command not found と出たら root で npm install -g pm2 してください
          pm2 restart web01 || pm2 start build/index.js --name web01