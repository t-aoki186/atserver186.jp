name: Deploy SvelteKit (Self-hosted)

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: self-hosted

    steps:
      # 1. 念のため最新のコードを作業ディレクトリに持ってくる
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Debug Environment
        run: |
          echo "--- 1. Who am I? ---"
          whoami
          
          echo "--- 2. Where is node? ---"
          which -a node
          
          echo "--- 3. What is in /usr/local/bin? ---"
          ls -l /usr/local/bin | grep node || echo "No node in /usr/local/bin"
          
          echo "--- 4. What is in /usr/bin? ---"
          ls -l /usr/bin/node || echo "No node in /usr/bin"
          
          echo "--- 5. Current PATH ---"
          echo $PATH