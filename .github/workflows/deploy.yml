name: Deploy SvelteKit (Self-hosted)

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: self-hosted

    steps:
      # 1. 念のため最新のコードを作業ディレクトリに持ってくる
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install and Build
        run: |
          # 1. パスを強制的に通す
          export PATH=/usr/local/bin:/usr/bin:$PATH
          
          # 2. 今動いているバージョンをログに出して「犯人」を特定する
          node -v
          npm -v
          
          # 3. npm自体を最新版にアップデートする（これ重要！）
          sudo npm install -g npm@latest
          
          cd /opt/atserver186.jp
          git pull origin main
          
          # 4. エンジンチェックを無視して強引にインストール（最終手段に近いですが有効です）
          npm install --engine-strict=false
          
          npm run build
          pm2 restart web01 || pm2 start build/index.js --name web01