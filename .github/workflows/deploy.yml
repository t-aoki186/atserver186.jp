name: Deploy SvelteKit (Self-hosted)

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: self-hosted

    steps:
      # 1. 念のため最新のコードを作業ディレクトリに持ってくる
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install and Build
        run: |
          # サーバー上のプロジェクトディレクトリに移動
          cd /root/atserver186.jp
          
          # 最新のソースを取得
          git pull origin main
          
          # 依存関係のインストールとビルド
          npm install
          npm run build
          
          # --- ここからが大事 ---
          # PM2を使ってバックグラウンドで起動/再起動する
          # すでに動いていれば restart、なければ start
          pm2 restart web01 || pm2 start build/index.js --name web01