name: Deploy SvelteKit (Self-hosted)

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: self-hosted

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install and Build
        run: |
          # 安全なディレクトリと登録する
          git config --global --add safe.directory /opt/atserver186.jp

          cd /opt/atserver186.jp
          
          # ソースを最新にする
          git pull origin main
          
          # モジュールのインストールとビルド
          npm install
          npm run build
          
          # PM2を再起動
          # ※もし pm2 command not found と出たら root で npm install -g pm2 する
          pm2 restart web01 || pm2 start build/index.js --name web01