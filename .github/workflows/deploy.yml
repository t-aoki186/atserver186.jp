name: Deploy SvelteKit (Self-hosted)

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: self-hosted

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Deploy to production
        run: |
          cd /opt/atserver186.jp
          git fetch origin main
          git reset --hard origin/main   # ローカルの変更をすべて破棄し、リモートと完全に一致させる
          npm ci                          # または npm install（後述）
          npm run build
          pm2 restart web01 || pm2 start build/index.js --name web01
