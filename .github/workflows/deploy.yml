name: Deploy SvelteKit (Self-hosted)

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: self-hosted

    steps:
      # 1. 念のため最新のコードを作業ディレクトリに持ってくる
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install and Build
        run: |
          # 1. 直接新しい方の node と npm を使うように設定
          # (which node で出たパスが /usr/local/bin/node の場合)
          alias node='/usr/local/bin/node'
          alias npm='/usr/local/bin/node /usr/local/bin/npm'
          
          cd /opt/atserver186.jp
          git pull origin main
          
          # 2. バージョン確認（ここで v24... と出れば勝ちです）
          /usr/local/bin/node -v
          
          # 3. フルパスで実行して EBADENGINE を回避
          /usr/local/bin/node /usr/local/bin/npm install --engine-strict=false
          /usr/local/bin/node /usr/local/bin/npm run build
          
          # 4. PM2もフルパスで（which pm2 で場所を確認してください）
          /usr/local/bin/pm2 restart web01 || /usr/local/bin/pm2 start build/index.js --name web01